<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sneak Peek 👀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#fff6f8;
    --blush:#ffd9e6;
    --rose:#ff8fae;
    --red:#e0294b;
    --deep:#6b2737;
    --white:#ffffff;
    --shadow: 0 20px 60px rgba(224,41,75,0.18);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; min-height:100vh; font-family:'Quicksand', sans-serif; color:var(--deep);
    background:
      radial-gradient(circle at 15% 20%, var(--blush) 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, var(--blush) 0%, transparent 45%),
      linear-gradient(160deg, var(--cream), #ffffff 60%, var(--cream));
    display:flex; align-items:center; justify-content:center; overflow-x:hidden; position:relative; padding:24px;
  }
  .bg-hearts{position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:0;}
  .bg-hearts span{position:absolute; bottom:-10%; font-size:28px; color:var(--rose); opacity:0.18; animation: floatUp linear infinite; user-select:none;}
  @keyframes floatUp{ 0%{transform:translateY(0) rotate(0deg); opacity:0;} 10%{opacity:0.25;} 90%{opacity:0.2;} 100%{transform:translateY(-115vh) rotate(25deg); opacity:0;} }

  .app{position:relative; z-index:1; width:100%; display:flex; justify-content:center;}
  .card{
    background:var(--white); border-radius:28px; box-shadow:var(--shadow); width:100%; max-width:460px;
    min-height:480px; padding:38px 32px; position:relative; display:flex; flex-direction:column; border:1px solid #ffeaf1;
  }
  .screen{display:none; flex-direction:column; flex:1; text-align:center;}
  .screen.active{display:flex; animation:fadeIn .5s ease;}
  @keyframes fadeIn{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  h1,h2,h3{font-family:'Cormorant Garamond', serif; margin:0; font-weight:600;}

  #screen-start{align-items:center; justify-content:center; gap:18px;}
  .eyebrow{letter-spacing:3px; text-transform:uppercase; font-size:12px; color:var(--rose); font-weight:700;}
  #screen-start h1{font-size:38px; font-style:italic; color:var(--red); line-height:1.1;}
  #screen-start p{font-size:15px; color:var(--deep); opacity:0.85; max-width:300px; margin:0 auto;}
  .peek-heart{font-size:36px; animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.12);} }

  .btn{border:none; cursor:pointer; font-family:'Quicksand',sans-serif; font-weight:700; border-radius:999px; transition: transform .15s ease, box-shadow .15s ease;}
  .btn:active{transform:scale(0.96);}
  .btn-primary{background:linear-gradient(135deg, var(--red), var(--rose)); color:var(--white); padding:14px 34px; font-size:16px; box-shadow:0 10px 24px rgba(224,41,75,0.35);}
  .btn-primary:hover{ box-shadow:0 12px 28px rgba(224,41,75,0.45); }
  .btn-locked{
    background:#e9e9ec; color:#9a9aa2; padding:14px 34px; font-size:16px;
    cursor:not-allowed; box-shadow:none; pointer-events:none;
  }

  .progress-hearts{display:flex; justify-content:center; gap:8px; margin-bottom:6px;}
  .progress-hearts .p-heart{font-size:16px; color:#f3c6d2; transition: color .3s ease, transform .3s ease;}
  .progress-hearts .p-heart.filled{color:var(--red); transform:scale(1.15);}
  .progress-label{font-size:12px; letter-spacing:2px; text-transform:uppercase; color:var(--rose); font-weight:700; margin-bottom:22px;}

  #screen-question{justify-content:flex-start;}
  .q-body{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;}
  .q-title{font-size:26px; color:var(--deep); line-height:1.3; padding:0 4px;}
  input[type="text"]{
    font-family:'Quicksand',sans-serif; font-size:16px; padding:12px 16px; border-radius:14px;
    border:2px solid #ffd9e6; background:var(--cream); color:var(--deep); outline:none; text-align:center;
    width:100%; max-width:260px;
  }
  input[type="text"]:focus{border-color:var(--red);}
  .next-btn{
    width:56px; height:56px; border-radius:50%; align-self:center; margin-top:8px;
    background:linear-gradient(135deg, var(--red), var(--rose)); color:var(--white);
    font-size:22px; display:flex; align-items:center; justify-content:center; box-shadow:0 10px 24px rgba(224,41,75,0.35);
  }
  .next-btn:disabled{ opacity:0.35; box-shadow:none; cursor:not-allowed; }

  .feedback-overlay{
    position:absolute; inset:0; border-radius:28px; background:rgba(255,255,255,0.94);
    display:none; align-items:center; justify-content:center; z-index:5;
  }
  .feedback-overlay.show{display:flex;}
  .feedback-icon{
    width:96px; height:96px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:52px; color:var(--white); animation:pop .35s ease;
  }
  .feedback-icon.correct{background:#4caf7d;}
  .feedback-icon.wrong{background:var(--red);}
  @keyframes pop{ 0%{transform:scale(0.3); opacity:0;} 70%{transform:scale(1.15);} 100%{transform:scale(1); opacity:1;} }

  /* ---- teaser screen ---- */
  #screen-teaser{align-items:center; justify-content:center; gap:16px;}
  .teaser-frame{
    width:230px; height:230px; border-radius:16px; overflow:hidden; position:relative;
    box-shadow:0 16px 32px rgba(107,39,55,0.25); background:var(--cream);
  }
  .teaser-frame img{width:100%; height:100%; object-fit:contain; filter:blur(16px) brightness(0.95); transform:scale(1.15);}
  .teaser-lock{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:38px; background:rgba(107,39,55,0.15);
  }
  .not-home{font-size:26px; font-style:italic; color:var(--red);}
  .teaser-warning{
    font-size:12.5px; color:var(--rose); font-weight:600; max-width:280px; margin:0 auto;
    background:var(--cream); border:1px dashed var(--rose); border-radius:12px; padding:10px 14px;
  }
</style>
</head>
<body>

<div class="bg-hearts" aria-hidden="true">
  <span style="left:6%; font-size:22px; animation-duration:14s; animation-delay:0s;">♥</span>
  <span style="left:18%; font-size:16px; animation-duration:18s; animation-delay:2s;">♥</span>
  <span style="left:30%; font-size:26px; animation-duration:12s; animation-delay:5s;">♥</span>
  <span style="left:45%; font-size:14px; animation-duration:20s; animation-delay:1s;">♥</span>
  <span style="left:58%; font-size:24px; animation-duration:15s; animation-delay:4s;">♥</span>
  <span style="left:70%; font-size:18px; animation-duration:17s; animation-delay:3s;">♥</span>
  <span style="left:82%; font-size:28px; animation-duration:13s; animation-delay:6s;">♥</span>
  <span style="left:92%; font-size:16px; animation-duration:19s; animation-delay:2.5s;">♥</span>
</div>

<div class="app">
  <div class="card">

    <section id="screen-start" class="screen active">
      <div class="eyebrow">Sneak peek</div>
      <div class="peek-heart">👀</div>
      <h1>Just a Little<br>Preview</h1>
      <p>Two quick questions, then a tiny hint of what's coming. This is not the real hunt yet.</p>
      <button class="btn btn-primary" id="startBtn">Take a peek ♡</button>
    </section>

    <section id="screen-question" class="screen">
      <div class="progress-label" id="progressLabel">Question 1 of 2</div>
      <div class="progress-hearts" id="progressHearts"></div>
      <div class="q-body" id="qBody"></div>
      <button class="next-btn" id="nextBtn" disabled>→</button>
      <div class="feedback-overlay" id="feedbackOverlay"><div class="feedback-icon" id="feedbackIcon"></div></div>
    </section>

    <section id="screen-teaser" class="screen">
      <div class="teaser-frame">
        <img id="teaserImg" src="" alt="a blurry hint">
        <div class="teaser-lock">🔒</div>
      </div>
      <div class="not-home">You're not home yet!</div>
      <div class="teaser-warning">Heads up: this was just a sneak peek, not the real quiz. The actual hunt is still coming 💌</div>
      <button class="btn btn-locked" disabled>Continue</button>
    </section>

  </div>
</div>

<script>
(function(){
  const questions = [
    { title:'Roses are red, violets are…?', correct: v => v === 'blue' },
    { title:'What is 2 + 2?', correct: v => v === '4' }
  ];

  const state = { current:0 };
  const screens = {
    start: document.getElementById('screen-start'),
    question: document.getElementById('screen-question'),
    teaser: document.getElementById('screen-teaser')
  };
  function showScreen(name){
    Object.values(screens).forEach(s=>s.classList.remove('active'));
    screens[name].classList.add('active');
  }

  const qBody = document.getElementById('qBody');
  const nextBtn = document.getElementById('nextBtn');
  const progressLabel = document.getElementById('progressLabel');
  const progressHearts = document.getElementById('progressHearts');
  const feedbackOverlay = document.getElementById('feedbackOverlay');
  const feedbackIcon = document.getElementById('feedbackIcon');

  function normalize(s){ return (s||'').trim().toLowerCase(); }

  function renderProgress(){
    progressLabel.textContent = 'Question ' + (state.current+1) + ' of ' + questions.length;
    progressHearts.innerHTML = '';
    for(let i=0;i<questions.length;i++){
      const span = document.createElement('span');
      span.className = 'p-heart' + (i < state.current ? ' filled' : '');
      span.textContent = '♥';
      progressHearts.appendChild(span);
    }
  }

  let getValue = () => null;

  function renderQuestion(idx){
    const q = questions[idx];
    renderProgress();
    nextBtn.disabled = true;
    qBody.innerHTML = `
      <div class="q-title">${q.title}</div>
      <input type="text" id="txtAnswer" placeholder="Type your answer…" autocomplete="off">
    `;
    const input = qBody.querySelector('#txtAnswer');
    input.addEventListener('input', () => { nextBtn.disabled = normalize(input.value).length === 0; });
    getValue = () => normalize(input.value);
  }

  function showFeedback(isCorrect, done){
    feedbackIcon.className = 'feedback-icon ' + (isCorrect ? 'correct' : 'wrong');
    feedbackIcon.textContent = isCorrect ? '✓' : '✕';
    feedbackOverlay.classList.add('show');
    setTimeout(() => {
      feedbackOverlay.classList.remove('show');
      done && done();
    }, 1000);
  }

  function checkAnswer(){
    if(nextBtn.disabled) return;
    const q = questions[state.current];
    const isCorrect = q.correct(getValue());
    showFeedback(isCorrect, () => { if(isCorrect) advance(); });
  }
  nextBtn.addEventListener('click', checkAnswer);

  function advance(){
    state.current++;
    if(state.current >= questions.length){
      showTeaser();
    } else {
      renderQuestion(state.current);
    }
  }

  function setPhotoSrc(imgEl, base){
    let triedAlt = false;
    imgEl.onerror = function(){
      if(!triedAlt){ triedAlt = true; imgEl.src = base + '.jpeg'; }
      else { imgEl.onerror = null; }
    };
    imgEl.src = base + '.jpg';
  }

  function showTeaser(){
    const img = document.getElementById('teaserImg');
    setPhotoSrc(img, 'foto1');
    showScreen('teaser');
  }

  document.getElementById('startBtn').addEventListener('click', () => {
    renderQuestion(0);
    showScreen('question');
  });

})();
</script>
</body>
</html>
